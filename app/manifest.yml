manifest_version: 1

artifacts:
  setup_script: setup_script.sql
  readme: README.md
  extension_code: true
  default_streamlit: core.connect_zoominfo

configuration:
  log_level: info
  trace_level: off

# References the consumer binds at install time. A Native App can only reach the
# public internet through an EXTERNAL ACCESS INTEGRATION, and can only read the
# ZoomInfo OAuth client credentials through a SECRET. Both are supplied by the
# consumer and bound to these named references via the app's "Security"/config
# screen (or with ALTER APPLICATION ... SET REFERENCE). The setup script wires
# them into the procedures at CREATE time.
references:
  - zoominfo_oauth_client:
      label: "ZoomInfo OAuth client"
      description: "Secret holding the ZoomInfo OAuth app config (client_id, client_secret, redirect_uri, scope) as JSON."
      privileges:
        - READ
      object_type: SECRET
      register_callback: core.register_reference
      configuration_callback: core.get_configuration

  - zoominfo_external_access:
      label: "ZoomInfo API external access"
      description: "External access integration allowing outbound HTTPS to api.zoominfo.com."
      privileges:
        - USAGE
      object_type: EXTERNAL ACCESS INTEGRATION
      register_callback: core.register_reference
      configuration_callback: core.get_configuration
