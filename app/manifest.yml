manifest_version: 1

version:
  name: v1_0
  label: "1.0"
  comment: "ZoomInfo connector — Client Credentials auth; contact/company search+enrich, lookup, usage."

artifacts:
  setup_script: setup_script.sql
  readme: README.md
  extension_code: true

configuration:
  log_level: info
  trace_level: on_event

# References the consumer binds at install time. A Native App can only reach the
# public internet through an EXTERNAL ACCESS INTEGRATION, and reads the consumer's
# ZoomInfo API credentials through a SECRET. Both are supplied by the consumer and
# bound to these named references via the app's "Security"/config screen (or with
# ALTER APPLICATION ... SET REFERENCE). Auth is OAuth Client Credentials: the
# consumer binds THEIR OWN ZoomInfo client_id/client_secret.
references:
  - zoominfo_oauth_client:
      label: "ZoomInfo API credentials"
      description: "Secret holding the consumer's ZoomInfo API client_id and client_secret (scope optional) as JSON."
      privileges:
        - READ
      object_type: SECRET
      register_callback: core.register_reference
      configuration_callback: core.get_configuration

  - zoominfo_external_access:
      label: "ZoomInfo API external access"
      description: "External access integration allowing outbound HTTPS to api.zoominfo.com."
      privileges:
        - USAGE
      object_type: EXTERNAL ACCESS INTEGRATION
      register_callback: core.register_reference
      configuration_callback: core.get_configuration
