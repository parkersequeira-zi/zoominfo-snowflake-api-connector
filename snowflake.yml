definition_version: 2

entities:
  zoominfo_connector_pkg:
    type: application package
    identifier: ZI_API_CONNECTOR_PKG
    stage: stage_content.zoominfo_stage
    manifest: app/manifest.yml
    artifacts:
      - src: app/*
        dest: ./

  zoominfo_connector_app:
    type: application
    identifier: ZI_API_CONNECTOR_APP
    from:
      target: zoominfo_connector_pkg
    debug: false
